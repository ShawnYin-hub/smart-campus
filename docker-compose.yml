name: smart-campus

services:
  # ========== 前端（Nginx 静态服务）==========
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        - VITE_API_BASE_URL=/api/v1
    container_name: smart-campus-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - smart-campus-net

  # ========== 后端（FastAPI）==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-campus-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/smart_campus
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - smart-campus-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ========== 数据库（PostgreSQL）==========
  db:
    image: postgres:16-alpine
    container_name: smart-campus-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=smart_campus
      - POSTGRES_SHARED_BUFFERS=128MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - smart-campus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_campus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  smart-campus-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
