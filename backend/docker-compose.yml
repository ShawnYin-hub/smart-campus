name: smart-campus

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-campus-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/smart_campus
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - DEBUG=${DEBUG:-false}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - smart-campus-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: postgres:16-alpine
    container_name: smart-campus-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=smart_campus
      - POSTGRES_SHARED_BUFFERS=128MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - smart-campus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_campus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  smart-campus-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
